<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000;
        }
        
        /* Вариант 1: Фоновое изображение */
        #bg-image {
            width: 100%;
            height: 100%;
            background-image: url('cat.jpg'); /* ваше изображение */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        /* Вариант 2: Видео */
        #bg-video {
            display: none; /* включите, если используете видео */
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Кнопка для старта (нужна для мобильных браузеров) */
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 24px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 1000;
        }
        
        #start-btn:active {
            background: rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Изображение -->
        <div id="bg-image"></div>
        
        <!-- Или видео (раскомментируйте если нужно) -->
        <!-- <video id="bg-video" loop playsinline muted>
            <source src="video.mp4" type="video/mp4">
        </video> -->
        
        <!-- Кнопка старта (обход блокировки autoplay) -->
        <button id="start-btn">Нажмите для старта</button>
    </div>
    
    <audio id="audio" loop>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        const startBtn = document.getElementById('start-btn');
        const audio = document.getElementById('audio');
        const video = document.getElementById('bg-video');
        
        // Для мобильных браузеров требуется взаимодействие пользователя
        startBtn.addEventListener('click', function() {
            // Скрываем кнопку
            startBtn.style.display = 'none';
            
            // Запускаем аудио
            audio.play().catch(e => console.log('Audio play failed:', e));
            
            // Если используете видео с звуком:
            // video.muted = false;
            // video.play();
        });
        
        // Попытка автозапуска (сработает если браузер разрешит)
        window.addEventListener('load', () => {
            audio.play().catch(() => {
                // Автозапуск заблокирован - показываем кнопку
                startBtn.style.display = 'block';
            });
        });
    </script>
</body>
</html>
