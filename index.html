<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000;
        }
        
        /* Вариант 1: Фоновое изображение */
        #bg-image {
            width: 100%;
            height: 100%;
            background-image: url('cat.jpg'); /* ваше изображение */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        /* Вариант 2: Видео */
        #bg-video {
            display: none; /* включите, если используете видео */
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Кнопка для старта (нужна для мобильных браузеров) */
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        
        #start-btn:hover {
            background: rgba(255, 255, 255, 1);
            transform: translate(-50%, -50%) scale(1.05);
        }
        
        #start-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Изображение -->
        <div id="bg-image"></div>
        
        <!-- Или видео (раскомментируйте если нужно) -->
        <!-- <video id="bg-video" loop playsinline muted>
            <source src="video.mp4" type="video/mp4">
        </video> -->
        
        <!-- Кнопка старта (обход блокировки autoplay) -->
        <!-- <button id="start-btn">Нажмите для старта</button> -->
        <button id="start-btn">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M10 8L16 12L10 16V8Z" fill="currentColor"/>
            </svg>
        </button>
    </div>
    
    <audio id="audio" loop preload="auto">
        <!-- Сначала самый лёгкий и современный формат -->
        <source src="audio.opus" type="audio/opus">
        <!-- Запасной вариант для Apple -->
        <source src="audio.m4a" type="audio/mp4">
        <!-- На самый крайний случай -->
        <source src="audio.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        const startBtn = document.getElementById('start-btn');
        const audio = document.getElementById('audio');
        const video = document.getElementById('bg-video');
        
        // Для мобильных браузеров требуется взаимодействие пользователя
        startBtn.addEventListener('click', function() {
            // Скрываем кнопку
            startBtn.style.display = 'none';
            
            // Запускаем аудио
            audio.play().catch(e => console.log('Audio play failed:', e));
            
            // Если используете видео с звуком:
            // video.muted = false;
            // video.play();
        });
        
        // Попытка автозапуска (сработает если браузер разрешит)
        window.addEventListener('load', () => {
            audio.play().catch(() => {
                // Автозапуск заблокирован - показываем кнопку
                startBtn.style.display = 'block';
            });
        });
    </script>
</body>
</html>
